apiVersion: apps/v1
kind: Deployment
metadata:
  name: trek
  namespace: trek
  labels:
    app: trek
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trek
  template:
    metadata:
      labels:
        app: trek
    spec:
      containers:
        - name: trek
          # renovate: datasource=docker depName=docker.io/mauriceboe/trek
          image: "mauriceboe/trek:2.7.0"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: trek-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: trek-secret
                  key: JWT_SECRET
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: uploads
              mountPath: /app/uploads
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
      # Needs patch in upstream or make my own image.
      # securityContext:
      #   fsGroup: 1001
      #   runAsGroup: 1001
      #   runAsNonRoot: true
      #   runAsUser: 1001
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: trek-data
        - name: uploads
          persistentVolumeClaim:
            claimName: trek-uploads